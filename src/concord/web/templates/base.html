<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Concord — Congressional Record Search{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-stone-50 text-stone-900 antialiased">
  <header class="border-b border-stone-200 bg-white">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-baseline gap-3 mb-4">
        <a href="/" class="text-2xl font-serif font-semibold text-stone-900 hover:text-stone-700">
          Concord
        </a>
        <span class="hidden sm:inline text-sm text-stone-500">— bills, members, votes &amp; the Congressional Record</span>
        <nav class="ml-auto text-sm flex gap-3">
          <a href="/bills" class="text-stone-600 hover:text-stone-900">Bills</a>
          <a href="/members" class="text-stone-600 hover:text-stone-900">Members</a>
          <a href="/votes" class="text-stone-600 hover:text-stone-900">Votes</a>
          <a href="/" class="text-stone-600 hover:text-stone-900">Search</a>
        </nav>
      </div>
      <form
        hx-get="/search"
        hx-target="main"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="submit"
        action="/search"
        method="get"
        class="flex flex-wrap gap-2"
      >
        <input
          type="search"
          name="q"
          value="{{ query|default('') }}"
          placeholder="Search bills, members, votes, and the Congressional Record…"
          class="flex-1 min-w-0 rounded border border-stone-300 px-3 py-2 text-base focus:border-stone-500 focus:outline-none focus:ring-1 focus:ring-stone-500"
          autocomplete="off"
        >
        <button
          type="submit"
          class="rounded bg-stone-900 px-4 py-2 text-white text-sm font-medium hover:bg-stone-700"
        >
          Search
        </button>
      </form>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-4xl mx-auto px-4 py-8 text-xs text-stone-500 border-t border-stone-200 mt-12">
    Sourced from
    <a class="underline hover:text-stone-700" href="https://api.congress.gov/">api.congress.gov</a>
    and <a class="underline hover:text-stone-700" href="https://www.congress.gov/">congress.gov</a>.
    Data is in the public domain. This is a personal demo, not affiliated with Congress.
  </footer>

  <style>
    /* Snippet match highlighting */
    mark { background-color: #fef08a; padding: 0 2px; border-radius: 2px; color: inherit; }
  </style>
</body>
</html>
