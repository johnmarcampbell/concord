repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: no-future-annotations
        name: Forbid `from __future__ import annotations`
        language: pygrep
        entry: '^from __future__ import annotations'
        types: [python]
