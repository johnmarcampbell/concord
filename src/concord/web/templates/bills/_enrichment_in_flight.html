<div
  id="enrichment-status"
  hx-get="/bills/{{ bill.congress }}/{{ bill.bill_type }}/{{ bill.bill_number }}/enrichment-status"
  hx-trigger="every 3s"
  hx-swap="outerHTML"
  class="border border-stone-200 bg-stone-50 rounded p-3 text-sm text-stone-600 flex items-center gap-3"
>
  <span class="inline-block w-3 h-3 rounded-full bg-stone-400 animate-pulse"></span>
  <span>Enriching this bill from Congress.gov…</span>
</div>
